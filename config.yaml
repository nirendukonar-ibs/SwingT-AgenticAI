portfolio:
  total_capital: 200000
  max_open_positions: 8
  max_sector_exposure: 0.30
  risk_per_trade: 0.02
  kelly_fraction: 0.5

watchlist:
  # Named index  : nifty50 | nifty100 | nifty200 | nifty500 | nifty_midcap150 | …
  # CSV file     : relative or absolute path to a .csv file
  # Explicit list: set universe to 'custom' and list tickers in custom_tickers
  universe: nifty50
  csv_file: ""               # e.g. "data/universe/my_stocks.csv"
  custom_tickers: []         # e.g. ["INFY", "TCS", "RELIANCE"]
  max_universe_size: 50      # cap — prevents accidentally scanning 500 stocks

filters:
  min_market_cap_cr: 5000
  min_avg_daily_volume: 500000
  min_fundamental_score: 5.0
  exclude_sectors: []
  exclude_tickers: []

kelly:
  fraction: 0.5
  lookback_trades: 20

alerts:
  stop_loss_breach: true
  target_hit: true
  output: terminal
